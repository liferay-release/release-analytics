# docker-compose.yml — testray_analytical for the triage tool
#
# Usage:
#   docker compose up -d       start postgres in the background
#   docker compose down        stop (data persists in the named volume)
#   docker compose down -v     stop and wipe the volume (clean slate)
#
# After the container is up, restore a shared dump into it:
#
#   bash db/testray_analytical_restore.sh <path-to-dump>
#
# Connection values for config/config.yml (testray section):
#   host: localhost
#   port: 5432
#   dbname: testray_analytical
#   user: release
#   password: triage_local    ← local dev only
#
# POSTGRES_USER below seeds a superuser that owns restored objects when
# pg_restore --no-owner is used. The dump is restored without GRANTs;
# ownership is assigned to this user directly.

services:
  testray_analytical_db:
    image: postgres:17
    container_name: testray_analytical_db
    environment:
      POSTGRES_DB:       testray_analytical
      POSTGRES_USER:     release
      POSTGRES_PASSWORD: triage_local
    ports:
      - "5432:5432"
    volumes:
      - testray_analytical_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U release -d testray_analytical"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  testray_analytical_data:
    name: testray_analytical_data
